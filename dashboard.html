<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>Dashboard</title>
</head>
<body>
  <!-- include header fragment; controller adds "username" attribute -->
  <div th:replace="~{fragments/header :: header}"></div>

  <h1>Dashboard</h1>
  <p>Welcome, <span th:text="${username != null ? username : #httpServletRequest.remoteUser}">user</span>!</p>
</body>
</html>
